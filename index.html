<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find emergency medical services in Sierra Leone - Works offline">
    <meta name="theme-color" content="#16a34a">
    <title>MedFind Salone - Emergency Health Services</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">

            <div id="map" class="map-container"></div>

            <div class="map-list-container">
                <div id="map-hospitals-list" class="hospitals-list">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Detail Screen -->
        <div id="detail-screen" class="screen">
            <header class="detail-header" id="detail-header">
                <button class="back-btn light" data-screen="map">
                    <span>←</span> Back
                </button>
                <div class="detail-header-content">
                    <h2 id="detail-name">Hospital Name</h2>
                    <p id="detail-type" class="detail-type">Type</p>
                </div>
            </header>

            <main class="detail-content">
                <div class="info-section">
                    <div class="info-row">
                        <div class="info-icon">📍</div>
                        <div class="info-text">
                            <h4>Address</h4>
                            <p id="detail-address">Address</p>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon">📞</div>
                        <div class="info-text">
                            <h4>Contact</h4>
                            <p id="detail-contact">Contact</p>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon">🏥</div>
                        <div class="info-text">
                            <h4>Available Services</h4>
                            <div id="detail-services" class="services-list">
                                <!-- Populated by JavaScript -->
                            </div>
                        </div>
                    </div>

                    <div class="info-row" id="distance-row">
                        <div class="info-icon">🚗</div>
                        <div class="info-text">
                            <h4>Distance</h4>
                            <p id="detail-distance">Calculating...</p>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon">🕐</div>
                        <div class="info-text">
                            <h4>Hours</h4>
                            <p id="detail-hours">Hours</p>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="directions-btn" class="btn btn-primary">
                        <span>🧭</span>
                        Get Directions
                    </button>
                    <button id="call-btn" class="btn btn-secondary">
                        <span>📞</span>
                        Call Now
                    </button>
                </div>
            </main>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>

</html>
